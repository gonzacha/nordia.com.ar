<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nordia Bot - Demo en Vivo</title>
    <style>
        :root {
            --wa-teal: #00a884;
            --wa-teal-dark: #008069;
            --wa-bg: #0a1929;
            --wa-panel: #111b27;
            --wa-message-out: #005c4b;
            --wa-message-in: #1f2c34;
            --wa-text: #e9edef;
            --wa-text-secondary: #8696a0;
            --wa-input-bg: #2a3942;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--wa-bg);
            height: 100vh;
            overflow: hidden;
            color: var(--wa-text);
        }

        /* Mobile-first: Stack vertical completo */
        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--wa-panel);
        }

        /* Header limpio y moderno */
        .chat-header {
            background: linear-gradient(135deg, var(--wa-teal-dark) 0%, var(--wa-teal) 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 600;
            color: white;
            margin-bottom: 2px;
        }

        .header-info .status {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Messages area con gradiente sutil */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 12px;
            background:
                linear-gradient(180deg, var(--wa-panel) 0%, #0d1520 100%);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Custom scrollbar */
        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        /* Messages con animación más fluida */
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: slideIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message--bot {
            background: var(--wa-message-in);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message--user {
            background: var(--wa-message-out);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            display: block;
            font-size: 11px;
            color: var(--wa-text-secondary);
            margin-top: 4px;
            text-align: right;
        }

        /* Input area mejorada */
        .input-area {
            background: var(--wa-panel);
            padding: 12px 16px 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-wrapper {
            flex: 1;
            background: var(--wa-input-bg);
            border-radius: 24px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            background: #36414a;
        }

        input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--wa-text);
            font-size: 16px;
            font-family: inherit;
        }

        input::placeholder {
            color: var(--wa-text-secondary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--wa-teal);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,168,132,0.3);
        }

        .send-btn:active {
            transform: scale(0.9);
            background: var(--wa-teal-dark);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        /* Badge de demo */
        .demo-badge {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        /* Tablet y Desktop */
        @media (min-width: 768px) {
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .chat-container {
                max-width: 480px;
                height: 720px;
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            }

            .send-btn:hover {
                background: var(--wa-teal-dark);
            }
        }

        /* Landscape mobile fix */
        @media (max-height: 500px) and (orientation: landscape) {
            .chat-header {
                padding: 10px 16px;
            }

            .messages {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar">N</div>
            <div class="header-info">
                <h1>Clínica Dental Norte</h1>
                <div class="status">
                    <span class="status-dot"></span>
                    En línea · WhatsApp Business
                </div>
            </div>
        </header>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="input"
                    placeholder="Escribí un mensaje..."
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                >
            </div>
            <button class="send-btn" id="sendBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Clear storage on load for clean demo
        localStorage.clear();

        const STATES = {
            INICIAL: 'inicial',
            ESP_SERVICIO: 'esperando_servicio',
            ESP_HORARIO: 'esperando_horario',
            ESP_DATOS: 'esperando_datos',
            ESP_CONFIRMACION: 'esperando_confirmacion',
            COMPLETADO: 'completado'
        };

        const KEYWORDS = {
            SERVICIOS: ['limpieza', 'consulta', 'urgencia'],
            CONFIRMAR: ['confirmar', 'confirmo', 'ok']
        };

        const AVAILABLE_SLOTS = [
            "Martes 10:30",
            "Martes 12:00",
            "Jueves 16:00"
        ];

        const MESSAGES = {
            WELCOME: "Hola 👋 Soy el asistente de turnos de Clínica Dental Norte.\n¿Querés sacar turno para Limpieza, Consulta o Urgencia?",
            ASK_SLOT: "Perfecto 👍\nTengo disponibles:\n- Martes 10:30\n- Martes 12:00\n- Jueves 16:00\n¿Cuál te sirve?",
            ASK_CONTACT: "Genial.\n¿A nombre de quién y teléfono?",
            CONFIRMED: (slot, name) => `Turno confirmado para ${slot} ✅${name ? `\nA nombre de ${name}.` : ""}\nTe voy a escribir antes para recordártelo.`,
            REMINDER: (name) => `Recordatorio demo:\n${name ? `${name}, ` : ""}tu turno es mañana a las 10:30.\nRespondé CONFIRMAR para asegurar tu lugar.`,
            FINAL: "Perfecto 👍\n¡Te esperamos!",
            INVALID_SERVICE: "¿Querés sacar turno para Limpieza, Consulta o Urgencia?",
            INVALID_SLOT: "No encontré ese horario. Elegí uno de estos:\n- Martes 10:30\n- Martes 12:00\n- Jueves 16:00",
            INVALID_CONFIRM: "Para confirmar respondé CONFIRMAR."
        };

        // Store
        class Store {
            constructor() {
                this.data = {
                    estado: STATES.INICIAL,
                    servicio: null,
                    turno: null,
                    contacto: null,
                    contactoNombre: null,
                    messages: []
                };
            }

            update(updates) {
                this.data = { ...this.data, ...updates };
            }

            reset() {
                this.data = {
                    estado: STATES.INICIAL,
                    servicio: null,
                    turno: null,
                    contacto: null,
                    contactoNombre: null,
                    messages: []
                };
            }

            addMessage(text, sender = 'bot') {
                const msg = {
                    id: Date.now(),
                    text,
                    sender,
                    time: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
                };
                this.data.messages.push(msg);
            }
        }

        // Bot Engine
        class BotEngine {
            constructor(store) {
                this.store = store;
            }

            process(inputText) {
                const state = this.store.data.estado;
                const raw = inputText.trim();
                const lower = raw.toLowerCase();
                const matchSlot = this.findSlot(lower);

                switch (state) {
                    case STATES.INICIAL:
                        if (KEYWORDS.SERVICIOS.some(kw => lower.includes(kw))) {
                            this.store.update({ estado: STATES.ESP_HORARIO, servicio: raw });
                            this.store.addMessage(MESSAGES.ASK_SLOT, 'bot');
                            break;
                        }
                        this.store.addMessage(MESSAGES.WELCOME, 'bot');
                        break;

                    case STATES.ESP_SERVICIO:
                        if (KEYWORDS.SERVICIOS.some(kw => lower.includes(kw))) {
                            this.store.update({ estado: STATES.ESP_HORARIO, servicio: raw });
                            this.store.addMessage(MESSAGES.ASK_SLOT, 'bot');
                        } else {
                            this.store.addMessage(MESSAGES.INVALID_SERVICE, 'bot');
                        }
                        break;

                    case STATES.ESP_HORARIO:
                        if (matchSlot) {
                            this.store.update({ estado: STATES.ESP_DATOS, turno: matchSlot });
                            this.store.addMessage(MESSAGES.ASK_CONTACT, 'bot');
                        } else {
                            this.store.addMessage(MESSAGES.INVALID_SLOT, 'bot');
                        }
                        break;

                    case STATES.ESP_DATOS:
                        if (raw.length > 0) {
                            const slot = this.store.data.turno || "Martes 10:30";
                            const name = raw.split(",")[0]?.trim() || null;
                            this.store.update({
                                estado: STATES.ESP_CONFIRMACION,
                                contacto: raw,
                                contactoNombre: name
                            });
                            this.store.addMessage(MESSAGES.CONFIRMED(slot, name), 'bot');
                            this.store.addMessage(MESSAGES.REMINDER(name), 'bot');
                        }
                        break;

                    case STATES.ESP_CONFIRMACION:
                        if (KEYWORDS.CONFIRMAR.some(kw => lower.includes(kw))) {
                            this.store.update({ estado: STATES.COMPLETADO });
                            this.store.addMessage(MESSAGES.FINAL, 'bot');
                        } else {
                            this.store.addMessage(MESSAGES.INVALID_CONFIRM, 'bot');
                        }
                        break;

                    case STATES.COMPLETADO:
                        this.store.addMessage(MESSAGES.WELCOME, 'bot');
                        this.store.update({ estado: STATES.ESP_SERVICIO });
                        break;
                }
            }

            findSlot(lowerText) {
                return AVAILABLE_SLOTS.find(slot => lowerText.includes(slot.toLowerCase())) || null;
            }
        }

        // UI
        class UI {
            constructor(store, bot) {
                this.store = store;
                this.bot = bot;
                this.isInitialRender = true; // Flag to prevent auto-focus on initial load
                this.elements = {
                    messages: document.getElementById('messages'),
                    input: document.getElementById('input'),
                    sendBtn: document.getElementById('sendBtn'),
                };
                this.bindEvents();
                this.render();
            }

            bindEvents() {
                const send = () => {
                    const text = this.elements.input.value.trim();
                    if (!text) return;

                    this.store.addMessage(text, 'user');
                    this.elements.input.value = '';
                    this.render();

                    setTimeout(() => {
                        this.bot.process(text);
                        this.render();
                    }, 400);
                };

                this.elements.sendBtn.addEventListener('click', send);
                this.elements.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') send();
                });

            }

            render() {
                this.elements.messages.innerHTML = '';

                this.store.data.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message message--${msg.sender}`;
                    const timeSuffix = msg.sender === 'user' ? ' ✓✓' : '';
                    div.innerHTML = `${this.escapeHtml(msg.text)}<span class="message-time">${msg.time}${timeSuffix}</span>`;
                    this.elements.messages.appendChild(div);
                });

                this.elements.messages.scrollTop = this.elements.messages.scrollHeight;

                // Only focus input after initial render (not on page load)
                // This prevents unwanted scroll-to-iframe behavior on landing page
                if (!this.isInitialRender) {
                    this.elements.input.focus();
                }
                this.isInitialRender = false;
            }

            escapeHtml(text) {
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            const store = new Store();
            const bot = new BotEngine(store);

            // Show welcome message immediately
            store.addMessage(MESSAGES.WELCOME, 'bot');
            store.update({ estado: STATES.ESP_SERVICIO });

            new UI(store, bot);
        });
    </script>
</body>
</html>
